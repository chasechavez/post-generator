<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Slide Gen">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" id="faviconLink" type="image/png">
<link rel="apple-touch-icon" id="appleTouchIcon">
<title>Chase Chavez — Post Slide Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap');

  :root{
    --athletic-blue:#005F87;
    --performance-teal:#00B8B8;
    --warm-slate:#565A5C;
    --near-black:#0A0A0A;
    --off-white:#F5F4F2;
    --bone:#F1EDE6;
    --headline-scale:1;
    --body-scale:1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#e8e6e2;
    font-family:'Barlow', Arial, sans-serif;
    color:var(--near-black);
  }

  .app{
    display:grid;
    grid-template-columns:380px 1fr;
    min-height:100vh;
  }
  @media (max-width:900px){
    .app{display:flex;flex-direction:column;}
    .preview-area{order:-1;padding:20px 16px;position:sticky;top:0;background:#e8e6e2;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.08);}
    .slide-shell{width:320px;}
    .panel{max-height:none;padding:20px 16px 100px;border-right:none;}
    .download-btn{
      position:fixed;left:16px;right:16px;bottom:16px;width:auto;
      z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.3);
      padding:14px 0 calc(14px + env(safe-area-inset-bottom));
    }
  }

  /* ===== LEFT PANEL ===== */
  .panel{
    background:#fff;
    border-right:1px solid #ddd8d3;
    padding:24px;
    overflow-y:auto;
    max-height:100vh;
  }
  .panel-header{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
  .panel-header .node-mark-header{width:34px;height:34px;flex-shrink:0;}
  .panel h1{
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-weight:700;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin:0;
  }
  .panel .sub{font-size:12px;color:var(--warm-slate);margin-bottom:20px;}

  label{
    display:block;
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--warm-slate);
    margin:16px 0 6px;
  }
  select, input[type=text], textarea, input[type=file]{
    width:100%;
    padding:9px 10px;
    border:1px solid #ccc;
    border-radius:4px;
    font-family:'Barlow', Arial, sans-serif;
    font-size:16px;
    color:var(--near-black);
    background:#fff;
  }
  textarea{resize:vertical;min-height:56px;}
  select{cursor:pointer;}

  .field-group{
    border-top:1px dashed #ddd;
    padding-top:4px;
    margin-top:12px;
  }

  .input-row{display:flex;gap:6px;align-items:flex-start;}
  .swatch-row{display:flex;gap:9px;flex-wrap:wrap;padding:2px 0;}
  .swatch-btn{width:32px;height:32px;border-radius:50%;border:2px solid #ddd;cursor:pointer;padding:0;box-shadow:inset 0 0 0 2px #fff;}
  .swatch-btn.active{border-color:var(--athletic-blue);box-shadow:inset 0 0 0 2px #fff, 0 0 0 2px var(--athletic-blue);}
  .input-row input, .input-row textarea{flex:1;min-width:0;}
  .mic-btn{
    flex-shrink:0;
    width:38px;height:38px;
    border:1px solid #ccc;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .mic-btn svg{width:17px;height:17px;}
  .mic-btn svg *{fill:var(--warm-slate);}
  .mic-btn.active{background:#c0392b;border-color:#c0392b;animation:pulse 1.2s infinite;}
  .mic-btn.active svg *{fill:#fff;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,0.5);}70%{box-shadow:0 0 0 8px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
  .mic-hint{font-size:11px;color:var(--performance-teal);margin-top:4px;display:none;}
  .mic-hint.show{display:block;}

  .download-btn{
    display:block;
    width:100%;
    margin-top:24px;
    background:var(--athletic-blue);
    color:#fff;
    border:none;
    padding:13px 0;
    border-radius:4px;
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
  }
  .download-btn:hover{background:#004a6b;}
  .download-btn.done{background:var(--performance-teal);}

  .reset-note{
    font-size:11px;
    color:var(--warm-slate);
    margin-top:10px;
    line-height:1.4;
  }

  /* ===== RIGHT PANEL / PREVIEW ===== */
  .preview-area{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }
  .slide-shell{
    width:520px;
    max-width:90vw;
    box-shadow:0 4px 24px rgba(0,0,0,0.15);
  }
  .slide{
    width:100%;
    aspect-ratio:1/1;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    background-size:cover;
    background-position:center;
  }

  .node-mark-sm{width:22px;height:22px;flex-shrink:0;}
  .brand-wordmark{
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:3px;
    text-transform:uppercase;
  }

  /* --- shared type styles --- */
  .s-cover{background:var(--dyn-bg, linear-gradient(160deg, var(--near-black) 0%, #1f2426 100%));padding:48px 44px;justify-content:space-between;}
  .s-cover .top{display:flex;align-items:center;gap:10px;}
  .s-cover .brand-wordmark{color:var(--dyn-text, #fff);opacity:0.9;}
  .s-cover .headline{font-family:'Barlow Condensed';font-weight:700;font-size:calc(52px * var(--headline-scale));line-height:1.03;text-transform:uppercase;color:var(--dyn-text, #fff);white-space:pre-wrap;}
  .s-cover .headline .accent{color:var(--performance-teal);}
  .s-cover .tagline{font-family:'Barlow Condensed';font-style:italic;font-size:calc(16px * var(--body-scale));letter-spacing:0.5px;color:var(--performance-teal);}
  .tagline-text{text-transform:none !important;font-style:italic;}

  .s-insight{background:var(--dyn-bg, var(--off-white));padding:56px 48px;justify-content:center;}
  .s-insight .rule{display:flex;gap:6px;margin-bottom:24px;}
  .s-insight .rule span{width:5px;height:34px;background:var(--dyn-text, var(--near-black));}
  .s-insight .headline{font-family:'Barlow Condensed';font-weight:700;font-size:calc(34px * var(--headline-scale));line-height:1.08;text-transform:uppercase;color:var(--dyn-text, var(--near-black));margin-bottom:20px;white-space:pre-wrap;}
  .s-insight .body{font-size:calc(18px * var(--body-scale));line-height:1.45;color:var(--dyn-text-soft, var(--warm-slate));font-weight:500;white-space:pre-wrap;}

  .s-breakdown{background:var(--dyn-bg, var(--athletic-blue));color:var(--dyn-text, #fff);}
  .s-breakdown .header-row{display:flex;justify-content:space-between;align-items:center;padding:20px 32px 16px;}
  .s-breakdown .brand-wordmark{color:var(--dyn-text-soft, rgba(255,255,255,0.85));font-size:calc(11px * var(--body-scale));letter-spacing:3px;}
  .s-breakdown .title-bar{background:var(--off-white);padding:18px 32px;}
  .s-breakdown .title-bar h2{font-family:'Barlow Condensed';font-weight:700;font-size:calc(25px * var(--headline-scale));line-height:1.1;text-transform:uppercase;color:var(--near-black);margin:0;white-space:pre-wrap;}
  .s-breakdown ul{padding:24px 32px 0;margin:0;list-style:none;flex:1;}
  .s-breakdown li{font-size:calc(16px * var(--body-scale));line-height:1.4;margin-bottom:16px;position:relative;padding-left:20px;}
  .s-breakdown li:before{content:"";position:absolute;left:0;top:8px;width:8px;height:8px;background:var(--performance-teal);border-radius:50%;}

  .s-bold{background:var(--dyn-bg, var(--warm-slate));padding:52px 44px;justify-content:space-between;}
  .s-bold .headline{font-family:'Barlow Condensed';font-weight:800;font-size:calc(40px * var(--headline-scale));line-height:1.06;text-transform:uppercase;color:var(--performance-teal);white-space:pre-wrap;}
  .s-bold .sub{font-size:calc(17px * var(--body-scale));line-height:1.5;color:var(--dyn-text, #fff);margin-top:22px;white-space:pre-wrap;}
  .s-bold .brand-wordmark{color:var(--dyn-text-soft, rgba(255,255,255,0.6));margin-top:24px;}

  .s-whyitmatters{background:var(--dyn-bg, var(--near-black));padding:44px 40px;}
  .s-whyitmatters .top-rule{width:60px;height:3px;background:var(--performance-teal);margin-bottom:18px;}
  .s-whyitmatters h2{font-family:'Barlow Condensed';font-weight:800;font-size:calc(30px * var(--headline-scale));line-height:1.08;text-transform:uppercase;color:var(--dyn-text, #fff);margin:0 0 22px;white-space:pre-wrap;}
  .s-whyitmatters ul{list-style:none;padding:0;margin:0;flex:1;}
  .s-whyitmatters li{font-size:calc(15px * var(--body-scale));line-height:1.4;color:var(--dyn-text-soft, #d8d6d3);margin-bottom:16px;padding-left:18px;position:relative;}
  .s-whyitmatters li:before{content:"—";position:absolute;left:0;color:var(--performance-teal);}
  .s-whyitmatters .brand-wordmark{color:var(--dyn-text-soft, rgba(255,255,255,0.5));margin-top:auto;align-self:center;padding-top:16px;}

  .s-quote{background:var(--dyn-bg, var(--near-black));padding:48px 44px;justify-content:center;align-items:center;text-align:center;}
  .s-quote .label{font-family:'Barlow Condensed';font-size:calc(12px * var(--body-scale));font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--performance-teal);margin-bottom:28px;align-self:flex-start;}
  .s-quote .quote-text{font-size:calc(23px * var(--headline-scale));line-height:1.4;color:var(--dyn-text, #fff);white-space:pre-wrap;}
  .s-quote .attribution{margin-top:24px;font-family:'Barlow Condensed';font-size:calc(18px * var(--body-scale));color:var(--performance-teal);}

  .s-beforeafter{background:var(--dyn-bg, var(--off-white));padding:0;}
  .s-beforeafter .header{padding:22px 32px 16px;}
  .s-beforeafter .header h2{font-family:'Barlow Condensed';font-weight:700;font-size:calc(24px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, var(--near-black));margin:0;white-space:pre-wrap;}
  .s-beforeafter .cols{flex:1;display:flex;}
  .s-beforeafter .col{flex:1;padding:20px 22px;}
  .s-beforeafter .col.before{background:var(--warm-slate);color:#fff;}
  .s-beforeafter .col.after{background:var(--athletic-blue);color:#fff;}
  .s-beforeafter .col-label{font-family:'Barlow Condensed';font-size:calc(13px * var(--body-scale));letter-spacing:2px;text-transform:uppercase;opacity:0.8;margin-bottom:14px;}
  .s-beforeafter .col p{font-size:calc(14px * var(--body-scale));line-height:1.45;margin:0 0 10px;white-space:pre-wrap;}

  .s-mistake{background:var(--dyn-bg, var(--near-black));padding:36px 36px 30px;}
  .s-mistake h2{font-family:'Barlow Condensed';font-weight:800;font-size:calc(26px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, #fff);margin:0 0 24px;white-space:pre-wrap;}
  .s-mistake .row{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
  .s-mistake .tag{font-family:'Barlow Condensed';font-size:calc(12px * var(--body-scale));font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:2px;flex-shrink:0;margin-top:2px;}
  .s-mistake .tag.wrong{background:#5c2a2a;color:#f2b8b8;}
  .s-mistake .tag.right{background:#0d3d3d;color:#7fe0d8;}
  .s-mistake .row p{font-size:calc(15px * var(--body-scale));line-height:1.4;color:var(--dyn-text-soft, #e5e3e0);margin:0;white-space:pre-wrap;}
  .s-mistake .brand-wordmark{color:var(--dyn-text-soft, rgba(255,255,255,0.5));margin-top:auto;align-self:center;padding-top:10px;}

  .s-rts{background:var(--dyn-bg, var(--performance-teal));padding:40px 36px;}
  .s-rts h2{font-family:'Barlow Condensed';font-weight:800;font-size:calc(26px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, var(--near-black));margin:0 0 22px;white-space:pre-wrap;}
  .s-rts ul{list-style:none;padding:0;margin:0;flex:1;}
  .s-rts li{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;font-size:calc(15px * var(--body-scale));line-height:1.4;color:var(--dyn-text, var(--near-black));font-weight:500;white-space:pre-wrap;}
  .s-rts .box{width:20px;height:20px;border:2.5px solid var(--dyn-text, var(--near-black));border-radius:3px;flex-shrink:0;margin-top:2px;}
  .s-rts .brand-wordmark{color:var(--dyn-text-soft, rgba(20,20,20,0.55));align-self:center;}

  .s-result{background:var(--dyn-bg, var(--near-black));padding:44px 40px;justify-content:space-between;}
  .s-result .eyebrow{font-family:'Barlow Condensed';font-size:calc(13px * var(--body-scale));letter-spacing:2px;text-transform:uppercase;color:var(--performance-teal);}
  .s-result .metric{font-family:'Barlow Condensed';font-weight:800;font-size:calc(82px * var(--headline-scale));color:var(--dyn-text, #fff);line-height:1;margin:14px 0 6px;}
  .s-result .metric-label{font-size:calc(16px * var(--body-scale));color:var(--dyn-text-soft, #d8d6d3);font-weight:500;margin-bottom:26px;white-space:pre-wrap;}
  .s-result .context{font-size:calc(14px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, #b8b6b3);border-top:1px solid #333;padding-top:18px;white-space:pre-wrap;}

  .s-define{background:var(--dyn-bg, var(--athletic-blue));padding:44px 40px;justify-content:center;}
  .s-define .term{font-family:'Barlow Condensed';font-weight:800;font-size:calc(36px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, #fff);margin-bottom:6px;}
  .s-define .pos{font-size:calc(14px * var(--body-scale));font-style:italic;color:var(--performance-teal);margin-bottom:20px;}
  .s-define .def{font-size:calc(17px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, #eaf3f7);white-space:pre-wrap;}
  .s-define .why{margin-top:20px;font-size:calc(13px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, rgba(255,255,255,0.75));border-left:3px solid var(--performance-teal);padding-left:14px;white-space:pre-wrap;}

  .s-progress{background:var(--dyn-bg, var(--off-white));padding:36px 34px;}
  .s-progress h2{font-family:'Barlow Condensed';font-weight:700;font-size:calc(23px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, var(--near-black));margin:0 0 20px;white-space:pre-wrap;}
  .s-progress .phase{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #ddd8d3;}
  .s-progress .phase:last-child{border-bottom:none;}
  .s-progress .phase-num{font-family:'Barlow Condensed';font-weight:800;font-size:calc(24px * var(--headline-scale));color:var(--performance-teal);width:36px;flex-shrink:0;}
  .s-progress .phase-title{font-family:'Barlow Condensed';font-weight:600;font-size:calc(15px * var(--body-scale));text-transform:uppercase;color:var(--dyn-text, var(--near-black));}
  .s-progress .phase-detail{font-size:calc(12px * var(--body-scale));color:var(--dyn-text-soft, var(--warm-slate));margin-top:2px;white-space:pre-wrap;}

  /* --- new photo-based types --- */
  .s-photocover{padding:40px 36px;justify-content:space-between;background-color:#333;}
  .s-photocover:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.65) 100%);}
  .s-photocover > *{position:relative;z-index:1;}
  .s-photocover .top-block{text-align:center;margin-top:30px;}
  .s-photocover .series-title{font-family:'Barlow Condensed';font-weight:800;font-size:calc(46px * var(--headline-scale));letter-spacing:1px;text-transform:uppercase;color:#fff;}
  .s-photocover .subtitle{font-family:'Barlow Condensed';font-weight:500;font-style:italic;font-size:calc(17px * var(--body-scale));letter-spacing:2px;text-transform:uppercase;color:#fff;margin-top:10px;}
  .s-photocover .bottom-block{display:flex;align-items:center;justify-content:center;gap:10px;}
  .s-photocover .brand-wordmark{color:#fff;}

  .s-photobanner{background-color:#333;}
  .s-photobanner:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.05) 55%, rgba(0,0,0,0.55) 100%);}
  .s-photobanner > *{position:relative;z-index:1;}
  .s-photobanner .top-row{display:flex;align-items:center;gap:8px;padding:26px 28px 0;}
  .s-photobanner .series-label{font-family:'Barlow Condensed';font-weight:700;font-size:calc(15px * var(--body-scale));letter-spacing:2px;text-transform:uppercase;color:#fff;}
  .s-photobanner .spacer{flex:1;}
  .s-photobanner .banner{margin-top:auto;background:rgba(0,95,135,0.88);padding:26px 28px;}
  .s-photobanner .banner h2{font-family:'Barlow Condensed';font-weight:800;font-size:calc(30px * var(--headline-scale));line-height:1.1;text-transform:uppercase;color:#fff;margin:0;white-space:pre-wrap;}

  .s-quotehighlight{padding:52px 40px;justify-content:center;background-color:#222;}
  .s-quotehighlight:before{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.4);}
  .s-quotehighlight > *{position:relative;z-index:1;}
  .s-quotehighlight .top-row{display:flex;align-items:center;gap:8px;margin-bottom:26px;}
  .s-quotehighlight .brand-wordmark{color:#fff;}
  .s-quotehighlight .quote-highlight{
    font-family:'Barlow Condensed';
    font-weight:700;
    font-size:calc(26px * var(--body-scale));
    line-height:1.55;
    text-transform:uppercase;
    color:#fff;
    background:var(--performance-teal);
    box-decoration-break:clone;
    -webkit-box-decoration-break:clone;
    padding:4px 8px;
    white-space:pre-wrap;
  }
  .s-quotehighlight .attribution{margin-top:22px;font-family:'Barlow Condensed';font-size:calc(16px * var(--body-scale));letter-spacing:1px;text-transform:uppercase;color:#fff;}

  /* --- long-form types --- */
  .s-article{background:var(--dyn-bg, var(--off-white));padding:44px 40px;overflow-y:auto;}
  .s-article .eyebrow{font-family:'Barlow Condensed';font-size:calc(12px * var(--body-scale));font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--performance-teal);margin-bottom:10px;}
  .s-article .headline{font-family:'Barlow Condensed';font-weight:700;font-size:calc(26px * var(--headline-scale));line-height:1.15;text-transform:uppercase;color:var(--dyn-text, var(--near-black));margin-bottom:16px;white-space:pre-wrap;}
  .s-article p{font-size:calc(14px * var(--body-scale));line-height:1.55;color:var(--dyn-text-soft, var(--warm-slate));margin:0 0 12px;white-space:pre-wrap;}

  .s-extlist{background:var(--dyn-bg, var(--near-black));padding:38px 36px;}
  .s-extlist h2{font-family:'Barlow Condensed';font-weight:800;font-size:calc(22px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, #fff);margin:0 0 18px;white-space:pre-wrap;}
  .s-extlist ol{list-style:none;padding:0;margin:0;flex:1;counter-reset:extlist;}
  .s-extlist li{counter-increment:extlist;display:flex;gap:10px;font-size:calc(13px * var(--body-scale));line-height:1.4;color:var(--dyn-text-soft, #e5e3e0);margin-bottom:10px;white-space:pre-wrap;}
  .s-extlist li:before{content:counter(extlist);font-family:'Barlow Condensed';font-weight:800;color:var(--performance-teal);flex-shrink:0;width:18px;}

  .s-qa{background:var(--dyn-bg, var(--off-white));padding:40px 38px;overflow-y:auto;}
  .s-qa h2{font-family:'Barlow Condensed';font-weight:700;font-size:calc(22px * var(--headline-scale));text-transform:uppercase;color:var(--dyn-text, var(--near-black));margin:0 0 18px;white-space:pre-wrap;}
  .s-qa .pair{margin-bottom:14px;}
  .s-qa .q{font-family:'Barlow Condensed';font-weight:700;font-size:calc(15px * var(--body-scale));color:var(--dyn-text, var(--athletic-blue));margin-bottom:3px;white-space:pre-wrap;}
  .s-qa .a{font-size:calc(13px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, var(--warm-slate));white-space:pre-wrap;}

  .s-twocol{background:var(--dyn-bg, var(--off-white));padding:36px 34px;}

let currentPhoto = {}; // stores dataURL per layout key that uses photo

const speechSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

function buildForm(){
  stopRecognition();
  const headlineScaleInput = document.getElementById('headlineScale');
  const bodyScaleInput = document.getElementById('bodyScale');
  if(headlineScaleInput){
    headlineScaleInput.value = 1;
    document.getElementById('headlineScaleLabel').textContent = '100%';

  if(bodyScaleInput){

  const preview = document.getElementById('slidePreview');
  if(preview){
    preview.style.setProperty('--headline-scale', 1);

  }
  const type = document.getElementById('layoutSelect').value;

  container.innerHTML = '';
  schemas[type].forEach(([id,label,fieldType,defVal,options])=>{
    const wrap = document.createElement('div');
    wrap.className='field-group';
    const lab = document.createElement('label');
    lab.textContent = label;
    wrap.appendChild(lab);

    if(fieldType==='swatch'){
      const row = document.createElement('div');
      row.className = 'swatch-row';
      row.id = 'f_'+id;
      row.dataset.value = defVal;
      options.forEach(opt=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'swatch-btn' + (opt.value===defVal ? ' active' : '');
        btn.style.background = opt.color;
        btn.title = opt.label;
        btn.dataset.val = opt.value;
        btn.onclick = function(){

          btn.classList.add('active');
          renderSlide();
        };
        row.appendChild(btn);
      });
      wrap.appendChild(row);
    } else if(fieldType==='select'){
      const sel = document.createElement('select');
      sel.id = 'f_'+id;
      options.forEach(opt=>{
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        if(opt.value===defVal) o.selected = true;
        sel.appendChild(o);
      });
      sel.onchange = renderSlide;
      wrap.appendChild(sel);
    } else if(fieldType==='textarea'){
      const row = document.createElement('div');
      row.className='input-row';
      const ta = document.createElement('textarea');
      ta.id = 'f_'+id;
      ta.value = defVal.replace(/\\n/g,'\n');

      wrap.appendChild(row);

      const inp = document.createElement('input');
      inp.type='file';
      inp.accept='image/*';
      inp.id='f_'+id;

function makeMicButton(fieldId){
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'mic-btn';
  btn.dataset.field = fieldId;
  btn.innerHTML = micIcon;
  btn.title = 'Tap to dictate';
  btn.onclick = function(e){
    e.preventDefault();
    toggleMic(fieldId, btn);
  };
  return btn;
}

/* ===== VOICE DICTATION ===== */
let recognition = null;
let recognizing = false;
let activeFieldId = null;
let baseTextForRecognition = '';

function initRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  r.onresult = function(e){
    let finalText = '';
    let interimText = '';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t;
      else interimText += t;
    }
    if(finalText) baseTextForRecognition = (baseTextForRecognition + ' ' + finalText).trim();
    const el = document.getElementById(activeFieldId);
    if(el){
      el.value = (baseTextForRecognition + ' ' + interimText).trim();
      renderSlide();
    }
  };
  r.onend = function(){
    if(recognizing){
      try{ r.start(); }catch(err){}
    }
  };
  r.onerror = function(){
    stopRecognition();
  };
  return r;
}

function toggleMic(fieldId, btn){
  if(!speechSupported){
    alert('Voice dictation needs Chrome or Safari — try one of those on this device.');
    return;
  }
  if(recognizing && activeFieldId===fieldId){
    stopRecognition();
    return;
  }
  if(recognizing) stopRecognition();
  activeFieldId = fieldId;
  const el = document.getElementById(fieldId);
  baseTextForRecognition = el ? el.value : '';
  if(!recognition) recognition = initRecognition();
  recognizing = true;
  document.querySelectorAll('.mic-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  try{ recognition.start(); }catch(err){}
}

function stopRecognition(){
  recognizing = false;
  if(recognition){ try{ recognition.stop(); }catch(err){} }
  document.querySelectorAll('.mic-btn').forEach(function(b){ b.classList.remove('active'); });
  activeFieldId = null;
}

function val(id){
  const el = document.getElementById('f_'+id);
  if(!el) return '';
  if(el.dataset && el.dataset.value !== undefined) return el.dataset.value;
  return el.value;
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function downloadSlide(){
  const node = document.getElementById('slidePreview');
  const btn = document.querySelector('.download-btn');
  const original = btn.textContent;
  html2canvas(node, {scale: 1080/node.offsetWidth, useCORS:true}).then(canvas=>{
    const dataUrl = canvas.toDataURL('image/png');
    if(isIOS()){
      // iOS Safari ignores the download attribute — open the image so the user can long-press to save it
      const win = window.open();
      if(win){
        win.document.write('<title>Long-press image to save</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="'+dataUrl+'" style="max-width:100%;height:auto;"></body>');
      } else {
        window.location.href = dataUrl;
      }
      btn.textContent = 'Long-Press Image to Save';
    } else {
      const type = document.getElementById('layoutSelect').value;
      const link = document.createElement('a');
      link.download = type + '_slide.png';
      link.href = dataUrl;
      link.click();
      btn.textContent = 'Downloaded';
    }
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent = original; btn.classList.remove('done'); }, 2000);
  });
}

function buildAppIcon(size, bg){
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,size,size);

  const pad = size * 0.24;
  const inner = size - pad*2;
  const scale = inner / 100;
  const tx = x => pad + x*scale;
  const ty = y => pad + y*scale;

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4*scale;
  ctx.lineCap = 'round';
  [[50,50,50,12],[50,50,82,68],[50,50,18,68]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();
    ctx.moveTo(tx(x1),ty(y1));
    ctx.lineTo(tx(x2),ty(y2));
    ctx.stroke();
  });

  const circle = (x,y,r,color) => {
    ctx.beginPath();
    ctx.arc(tx(x),ty(y), r*scale, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  };
  circle(50,12,8.4,'#00B8B8');
  circle(82,68,8.4,'#00B8B8');
  circle(18,68,8.4,'#00B8B8');
  circle(50,50,6,'#fff');

  return canvas.toDataURL('image/png');
}
