<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Slide Gen">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" id="faviconLink" type="image/png">
<link rel="apple-touch-icon" id="appleTouchIcon">
<title>Chase Chavez — Post Slide Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap');

  :root{
    --athletic-blue:#005F87;
    --performance-teal:#00B8B8;
    --warm-slate:#565A5C;
    --near-black:#0A0A0A;
    --off-white:#F5F4F2;
    --bone:#F1EDE6;
    --headline-scale:1;
    --body-scale:1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#e8e6e2;
    font-family:'Barlow', Arial, sans-serif;
    color:var(--near-black);
  }

  .app{
    display:grid;
    grid-template-columns:380px 1fr;
    min-height:100vh;
  }
  @media (max-width:900px){
    .app{display:flex;flex-direction:column;}
    .preview-area{order:-1;padding:20px 16px;position:sticky;top:0;background:#e8e6e2;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.08);}
    .slide-shell{width:320px;}
    .panel{max-height:none;padding:20px 16px 100px;border-right:none;}
    .download-btn{
      position:fixed;left:16px;right:16px;bottom:16px;width:auto;
      z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.3);
      padding:14px 0 calc(14px + env(safe-area-inset-bottom));
    }
  }

  /* ===== LEFT PANEL ===== */
  .panel{
    background:#fff;
    border-right:1px solid #ddd8d3;
    padding:24px;
    overflow-y:auto;
    max-height:100vh;
  }
  .panel-header{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
  .panel-header .node-mark-header{width:34px;height:34px;flex-shrink:0;}
  .panel h1{
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-weight:700;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin:0;
  }
  .panel .sub{font-size:12px;color:var(--warm-slate);margin-bottom:20px;}

  label{
    display:block;
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--warm-slate);
    margin:16px 0 6px;
  }
  select, input[type=text], textarea{
    width:100%;
    padding:9px 10px;
    border:1px solid #ccc;
    border-radius:4px;
    font-family:'Barlow', Arial, sans-serif;
    font-size:16px;
    color:var(--near-black);
    background:#fff;
  }
  textarea{resize:vertical;min-height:56px;}
  select{cursor:pointer;}

  .field-group{
    border-top:1px dashed #ddd;
    padding-top:4px;
    margin-top:12px;
  }
  .field-group.controls-group{
    background:#f7f6f4;
    margin:16px -24px 0;
    padding:16px 24px 20px;
    border-top:1px solid #e2ded8;
    border-bottom:1px solid #e2ded8;
  }
  .controls-heading{
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--athletic-blue);
    margin:0 0 4px;
  }

  .input-row{display:flex;gap:6px;align-items:flex-start;}
  .swatch-row{display:flex;gap:9px;flex-wrap:wrap;padding:2px 0;}
  .swatch-btn{width:32px;height:32px;border-radius:50%;border:2px solid #ddd;cursor:pointer;padding:0;box-shadow:inset 0 0 0 2px #fff;}
  .swatch-btn.active{border-color:var(--athletic-blue);box-shadow:inset 0 0 0 2px #fff, 0 0 0 2px var(--athletic-blue);}
  .input-row input, .input-row textarea{flex:1;min-width:0;}
  .mic-btn{
    flex-shrink:0;
    width:38px;height:38px;
    border:1px solid #ccc;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .mic-btn svg{width:17px;height:17px;}
  .mic-btn svg *{fill:var(--warm-slate);}
  .mic-btn.active{background:#c0392b;border-color:#c0392b;animation:pulse 1.2s infinite;}
  .mic-btn.active svg *{fill:#fff;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,0.5);}70%{box-shadow:0 0 0 8px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}

  .download-btn{
    display:block;
    width:100%;
    margin-top:24px;
    background:var(--athletic-blue);
    color:#fff;
    border:none;
    padding:13px 0;
    border-radius:4px;
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
  }
  .download-btn:hover{background:#004a6b;}
  .download-btn.done{background:var(--performance-teal);}

  .reset-note{
    font-size:11px;
    color:var(--warm-slate);
    margin-top:10px;
    line-height:1.4;
  }

  /* ===== RIGHT PANEL / PREVIEW ===== */
  .preview-area{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }
  .slide-shell{
    width:520px;
    max-width:90vw;
    box-shadow:0 4px 24px rgba(0,0,0,0.15);
  }
  .slide{
    width:100%;
    aspect-ratio:1/1;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .node-mark-sm{width:24px;height:24px;flex-shrink:0;}

  /* ===== UNIFIED SLIDE SHELL ===== */
  .s-shell{padding:0;position:relative;background:var(--dyn-bg, var(--near-black));}
  .s-shell .node-mark-bg{position:absolute;bottom:-30px;right:-30px;width:280px;height:280px;opacity:0.14;pointer-events:none;}
  .node-mark-center{width:78px;height:78px;flex-shrink:0;margin:0 auto 22px;display:block;}
  .shell-top-row{display:flex;margin-bottom:18px;}
  .shell-top-row.left{justify-content:flex-start;}
  .shell-top-row.right{justify-content:flex-end;}

  .shell-content{position:relative;z-index:1;flex:1;padding:52px 46px;display:flex;flex-direction:column;width:100%;min-height:0;}
  .shell-content.center-text{justify-content:center;align-items:center;text-align:center;}

  .texture-band{flex-shrink:0;height:74px;display:flex;align-items:center;padding:0 26px;background-color:var(--dyn-bg, var(--near-black));}
  .texture-band.nodegrid{background-image:radial-gradient(circle, rgba(0,184,184,0.4) 1.5px, transparent 1.5px);background-size:20px 20px;}
  .texture-band.vectorslope{background-image:repeating-linear-gradient(135deg, rgba(0,184,184,0.28) 0px, rgba(0,184,184,0.28) 1.5px, transparent 1.5px, transparent 24px);}
  .texture-band.pitchlines{background-image:repeating-linear-gradient(180deg, rgba(0,184,184,0.22) 0px, rgba(0,184,184,0.22) 1px, transparent 1px, transparent 9px);}

  /* --- content elements (shared across all shapes) --- */
  .shell-content .headline{font-family:'Barlow Condensed';font-weight:700;font-size:calc(34px * var(--headline-scale));line-height:1.08;text-transform:uppercase;color:var(--dyn-text, #fff);margin-bottom:16px;white-space:pre-wrap;}
  .shell-content .body-p{font-size:calc(16px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, rgba(255,255,255,0.75));margin:0 0 12px;white-space:pre-wrap;}
  .shell-content .free-text{font-size:calc(22px * var(--headline-scale));line-height:1.5;color:var(--dyn-text, #fff);white-space:pre-wrap;}
  .shell-content .quote-text{font-size:calc(25px * var(--headline-scale));line-height:1.4;color:var(--dyn-text, #fff);white-space:pre-wrap;}
  .shell-content .attribution{margin-top:22px;font-family:'Barlow Condensed';font-size:calc(15px * var(--body-scale));letter-spacing:0.5px;color:var(--performance-teal);}
  .shell-content .eyebrow{font-family:'Barlow Condensed';font-size:calc(13px * var(--body-scale));letter-spacing:2px;text-transform:uppercase;color:var(--performance-teal);margin-bottom:10px;}
  .shell-content .metric{font-family:'Barlow Condensed';font-weight:800;font-size:calc(74px * var(--headline-scale));color:var(--dyn-text, #fff);line-height:1;margin-bottom:10px;}
  .shell-content .metric-label{font-size:calc(16px * var(--body-scale));color:var(--dyn-text-soft, rgba(255,255,255,0.75));margin-bottom:16px;font-weight:500;white-space:pre-wrap;}
  .shell-content .context{font-size:calc(13px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, rgba(255,255,255,0.6));border-top:1px solid rgba(128,128,128,0.35);padding-top:16px;white-space:pre-wrap;margin-top:auto;}

  .shell-content .split-cols{display:flex;gap:26px;flex:1;margin-top:6px;}
  .shell-content .split-col{flex:1;}
  .shell-content .split-col-h{font-family:'Barlow Condensed';font-weight:700;font-size:calc(13px * var(--body-scale));letter-spacing:1.5px;text-transform:uppercase;color:var(--performance-teal);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--performance-teal);}
  .shell-content .split-col p{font-size:calc(13.5px * var(--body-scale));line-height:1.5;color:var(--dyn-text-soft, rgba(255,255,255,0.75));white-space:pre-wrap;}

  /* --- bullet / symbol styles --- */
  .bullet-list{list-style:none;padding:0;margin:0;flex:1;}
  .bullet-list li{position:relative;padding-left:28px;margin-bottom:14px;font-size:calc(15.5px * var(--body-scale));line-height:1.4;color:var(--dyn-text, #fff);white-space:pre-wrap;}
  .bullet-list.bullet-dot li:before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:50%;background:var(--performance-teal);}
  .bullet-list.bullet-dash li:before{content:"—";position:absolute;left:0;color:var(--performance-teal);}
  .bullet-list.bullet-number{counter-reset:bl;}
  .bullet-list.bullet-number li{counter-increment:bl;}
  .bullet-list.bullet-number li:before{content:counter(bl);position:absolute;left:0;font-family:'Barlow Condensed';font-weight:800;color:var(--performance-teal);}
  .bullet-list.bullet-check li:before{content:"";position:absolute;left:0;top:1px;width:16px;height:16px;border:2.5px solid var(--performance-teal);border-radius:3px;}
  .bullet-list.bullet-arrow li:before{content:"→";position:absolute;left:0;color:var(--performance-teal);font-weight:700;}
  .bullet-list.bullet-node li{padding-left:24px;}
  .bullet-list.bullet-node li .mini-node{position:absolute;left:0;top:6px;width:9px;height:9px;border-radius:50%;background:var(--performance-teal);}

</style>
</head>
<body>

<div class="app">

  <!-- ================= LEFT PANEL ================= -->
  <div class="panel">
    <div class="panel-header">
      <svg class="node-mark-header" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="50" x2="50" y2="12" stroke="#005F87" stroke-width="4"/>
        <line x1="50" y1="50" x2="82" y2="68" stroke="#005F87" stroke-width="4"/>
        <line x1="50" y1="50" x2="18" y2="68" stroke="#005F87" stroke-width="4"/>
        <circle cx="50" cy="12" r="8.4" fill="#00B8B8"/>
        <circle cx="82" cy="68" r="8.4" fill="#00B8B8"/>
        <circle cx="18" cy="68" r="8.4" fill="#00B8B8"/>
        <circle cx="50" cy="50" r="6" fill="#005F87"/>
      </svg>
      <h1>Post Slide Generator</h1>
    </div>
    <div class="sub">Pick a shape, style it your way, download.</div>

    <label>Content Shape</label>
    <select id="layoutSelect">
      <option value="freetext" selected>Free Text (one open block)</option>
      <option value="body">Headline + Body</option>
      <option value="list">Headline + List</option>
      <option value="quote">Quote</option>
      <option value="stat">Stat / Number</option>
      <option value="split">Two-Column Split</option>
    </select>

    <label>Title Size <span id="headlineScaleLabel">100%</span></label>
    <input type="range" id="headlineScale" min="0.5" max="1.8" step="0.05" value="1">
    <label>Body Size <span id="bodyScaleLabel">100%</span></label>
    <input type="range" id="bodyScale" min="0.5" max="1.8" step="0.05" value="1">

    <div id="formFields"></div>

    <button class="download-btn" onclick="downloadSlide()">Download PNG</button>
    <div class="reset-note">Tap the mic next to any field to dictate instead of typing. Background, logo, and placement combine freely — mix and match for as many looks as you need. Refresh the page to start fully clean.</div>
  </div>

  <!-- ================= RIGHT PANEL / PREVIEW ================= -->
  <div class="preview-area">
    <div class="slide-shell">
      <div class="slide" id="slidePreview"></div>
    </div>
  </div>

</div>

<script>
// ===== Shared style vocabulary =====
const BG_SWATCHES = [
  {value:'blue',label:'Athletic Blue',color:'#005F87'},
  {value:'teal',label:'Performance Teal',color:'#00B8B8'},
  {value:'black',label:'Near Black',color:'#0A0A0A'},
  {value:'slate',label:'Warm Slate',color:'#565A5C'},
  {value:'bone',label:'Bone',color:'#F1EDE6'},
  {value:'white',label:'Off-White',color:'#F5F4F2'}
];
const LOGO_SWATCHES = [
  {value:'white',label:'White',color:'#FFFFFF'},
  {value:'blue',label:'Athletic Blue',color:'#005F87'},
  {value:'bone',label:'Bone',color:'#F1EDE6'}
];
const TEXT_SWATCHES = [
  {value:'auto',label:'Auto (best contrast)',color:'linear-gradient(135deg, #fff 50%, #0A0A0A 50%)'},
  {value:'white',label:'White',color:'#FFFFFF'},
  {value:'black',label:'Near Black',color:'#0A0A0A'},
  {value:'blue',label:'Athletic Blue',color:'#005F87'},
  {value:'teal',label:'Performance Teal',color:'#00B8B8'},
  {value:'slate',label:'Warm Slate',color:'#565A5C'}
];
const PLACEMENT_OPTIONS = [
  {value:'corner',label:'Corner Watermark'},
  {value:'centered',label:'Centered Above Text'},
  {value:'top-left',label:'Top Left'},
  {value:'top-right',label:'Top Right'},
  {value:'texture-top',label:'Textured Band (Top)'},
  {value:'texture-bottom',label:'Textured Band (Bottom)'},
  {value:'none',label:'None'}
];
const TEXTURE_OPTIONS = [
  {value:'nodegrid',label:'Node Grid'},
  {value:'vectorslope',label:'Vector Slope'},
  {value:'pitchlines',label:'Pitch Lines'}
];
const BULLET_OPTIONS = [
  {value:'dot',label:'Dot'},
  {value:'dash',label:'Dash'},
  {value:'number',label:'Number'},
  {value:'check',label:'Checkbox'},
  {value:'arrow',label:'Arrow'},
  {value:'node',label:'Node Mark'}
];

const BG_COLOR_CSS = {blue:'#005F87', teal:'#00B8B8', black:'#0A0A0A', slate:'#565A5C', bone:'#F1EDE6', white:'#F5F4F2'};
const BG_TEXT_PAIR = {
  blue:  {text:'#fff', soft:'rgba(255,255,255,0.7)'},
  teal:  {text:'#0A0A0A', soft:'rgba(10,10,10,0.65)'},
  black: {text:'#fff', soft:'rgba(255,255,255,0.65)'},
  slate: {text:'#F5F4F2', soft:'rgba(245,244,242,0.75)'},
  bone:  {text:'#0A0A0A', soft:'rgba(10,10,10,0.65)'},
  white: {text:'#0A0A0A', soft:'rgba(10,10,10,0.65)'}
};
const LOGO_ARM_CSS = {white:'#fff', blue:'#005F87', bone:'#F1EDE6'};
const TEXT_COLOR_PAIR = {
  white: {text:'#fff', soft:'rgba(255,255,255,0.7)'},
  black: {text:'#0A0A0A', soft:'rgba(10,10,10,0.65)'},
  blue:  {text:'#005F87', soft:'rgba(0,95,135,0.75)'},
  teal:  {text:'#00B8B8', soft:'rgba(0,184,184,0.75)'},
  slate: {text:'#565A5C', soft:'rgba(86,90,92,0.75)'}
};

// Builds the inline --dyn-bg/--dyn-text/--logo-* custom properties for a slide wrapper.
// Terminal nodes always invert to Athletic Blue on a teal background per the brand book.
// textKey overrides the auto-contrast text color computed from bgKey when set to
// anything other than 'auto'.
function dynVarsStyle(bgKey, logoKey, textKey){
  let css = '';
  if(bgKey){
    const pair = (textKey && textKey !== 'auto' && TEXT_COLOR_PAIR[textKey]) || BG_TEXT_PAIR[bgKey] || BG_TEXT_PAIR.black;
    css += `--dyn-bg:${BG_COLOR_CSS[bgKey] || BG_COLOR_CSS.black};--dyn-text:${pair.text};--dyn-text-soft:${pair.soft};`;
  }
  if(logoKey){
    const arm = LOGO_ARM_CSS[logoKey] || '#fff';
    const terminal = bgKey === 'teal' ? '#005F87' : '#00B8B8';
    css += `--logo-arm:${arm};--logo-terminal:${terminal};`;
  }
  return css;
}

function nodeMarkSvg(armHub, terminal, extraClass){
  return `<svg class="${extraClass || 'node-mark-bg'}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <line x1="50" y1="50" x2="50" y2="12" stroke="${armHub}" stroke-width="4"/>
  <line x1="50" y1="50" x2="82" y2="68" stroke="${armHub}" stroke-width="4"/>
  <line x1="50" y1="50" x2="18" y2="68" stroke="${armHub}" stroke-width="4"/>
  <circle cx="50" cy="12" r="8.4" fill="${terminal}"/>
  <circle cx="82" cy="68" r="8.4" fill="${terminal}"/>
  <circle cx="18" cy="68" r="8.4" fill="${terminal}"/>
  <circle cx="50" cy="50" r="6" fill="${armHub}"/>
</svg>`;
}

// Builds the full slide wrapper for any content shape: background, logo (in whichever
// placement was chosen, including textured bands), and the shape-specific inner HTML.
function buildSlideShell(bgKey, logoKey, placement, textureKey, contentHtml, align, textKey){
  const styleVars = dynVarsStyle(bgKey, logoKey, textKey);
  const showLogo = !!logoKey && placement && placement !== 'none';
  const armVar = 'var(--logo-arm, #fff)';
  const termVar = 'var(--logo-terminal, #00B8B8)';
  const contentClass = 'shell-content' + (align === 'center' ? ' center-text' : '');

  if(showLogo && (placement === 'texture-top' || placement === 'texture-bottom')){
    const mark = nodeMarkSvg(armVar, termVar, 'node-mark-sm');
    const band = `<div class="texture-band ${textureKey || 'nodegrid'}">${mark}</div>`;
    const body = `<div class="${contentClass}">${contentHtml}</div>`;
    const inner = placement === 'texture-top' ? band + body : body + band;
    return `<div class="s-shell" style="width:100%;height:100%;display:flex;flex-direction:column;${styleVars}">${inner}</div>`;
  }

  let cornerMark = '', inlineMark = '';
  if(showLogo){
    if(placement === 'corner') cornerMark = nodeMarkSvg(armVar, termVar, 'node-mark-bg');
    else if(placement === 'centered') inlineMark = nodeMarkSvg(armVar, termVar, 'node-mark-center');
    else if(placement === 'top-left') inlineMark = `<div class="shell-top-row left">${nodeMarkSvg(armVar, termVar, 'node-mark-sm')}</div>`;
    else if(placement === 'top-right') inlineMark = `<div class="shell-top-row right">${nodeMarkSvg(armVar, termVar, 'node-mark-sm')}</div>`;
  }

  return `<div class="s-shell" style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;${styleVars}">
    ${cornerMark}
    <div class="${contentClass}">${inlineMark}${contentHtml}</div>
  </div>`;
}

// Renders a bullet/numbered list with the chosen symbol style.
function buildBulletList(items, style){
  const rows = items.filter(t => t).map(t => {
    if(style === 'node') return `<li><span class="mini-node"></span>${esc(t)}</li>`;
    return `<li>${esc(t)}</li>`;
  }).join('');
  return `<ul class="bullet-list bullet-${style || 'dot'}">${rows}</ul>`;
}

// Fields every content shape shares: background, logo color/placement, texture style.
function styleFields(bgDefault){
  return [
    ['bg','Background','swatch',bgDefault,BG_SWATCHES],
    ['textColor','Text Color','swatch','auto',TEXT_SWATCHES],
    ['logo','Logo Color','swatch','white',LOGO_SWATCHES],
    ['placement','Logo Placement','select','corner',PLACEMENT_OPTIONS],
    ['texture','Texture Style (for textured band)','select','nodegrid',TEXTURE_OPTIONS]
  ];
}

const schemas = {
  freetext: [
    ...styleFields('black'),
    ['text','Your text','textarea','']
  ],
  body: [
    ...styleFields('white'),
    ['headline','Headline','textarea',''],
    ['body1','Paragraph 1','textarea',''],
    ['body2','Paragraph 2 (optional)','textarea','']
  ],
  list: [
    ...styleFields('black'),
    ['bulletStyle','Bullet Style','select','dot',BULLET_OPTIONS],
    ['headline','Headline','textarea',''],
    ['i1','Item 1','text',''],
    ['i2','Item 2','text',''],
    ['i3','Item 3','text',''],
    ['i4','Item 4','text',''],
    ['i5','Item 5 (optional)','text',''],
    ['i6','Item 6 (optional)','text','']
  ],
  quote: [
    ...styleFields('black'),
    ['quote','Quote text','textarea',''],
    ['attribution','Attribution','text','— Chase Chavez, PT · DPT · SCS']
  ],
  stat: [
    ...styleFields('black'),
    ['eyebrow','Eyebrow / label','text',''],
    ['metric','Big number','text',''],
    ['metriclabel','What the number means','textarea',''],
    ['context','Context (optional)','textarea','']
  ],
  split: [
    ...styleFields('white'),
    ['headline','Headline (optional)','textarea',''],
    ['col1h','Column 1 heading','text',''],
    ['col1body','Column 1 text','textarea',''],
    ['col2h','Column 2 heading','text',''],
    ['col2body','Column 2 text','textarea','']
  ]
};

const micIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-3.06A9 9 0 0 0 21 11h-2z"/></svg>`;

const speechSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

function buildForm(){
  stopRecognition();
  const headlineScaleInput = document.getElementById('headlineScale');
  const bodyScaleInput = document.getElementById('bodyScale');
  if(headlineScaleInput){
    headlineScaleInput.value = 1;
    document.getElementById('headlineScaleLabel').textContent = '100%';
  }
  if(bodyScaleInput){
    bodyScaleInput.value = 1;
    document.getElementById('bodyScaleLabel').textContent = '100%';
  }
  const preview = document.getElementById('slidePreview');
  if(preview){
    preview.style.setProperty('--headline-scale', 1);
    preview.style.setProperty('--body-scale', 1);
  }
  const type = document.getElementById('layoutSelect').value;
  const container = document.getElementById('formFields');
  container.innerHTML = '';
  const styleFieldIds = ['bg','textColor','logo','placement','texture'];
  let controlsWrap = null;

  schemas[type].forEach(([id,label,fieldType,defVal,options])=>{
    const wrap = document.createElement('div');
    wrap.className='field-group';

    // Group the four style controls together under one visual heading.
    if(styleFieldIds.includes(id)){
      if(!controlsWrap){
        controlsWrap = document.createElement('div');
        controlsWrap.className = 'field-group controls-group';
        const heading = document.createElement('div');
        heading.className = 'controls-heading';
        heading.textContent = 'Style';
        controlsWrap.appendChild(heading);
        container.appendChild(controlsWrap);
      }
      wrap.className = '';
    }

    const lab = document.createElement('label');
    lab.textContent = label;
    wrap.appendChild(lab);

    if(fieldType==='swatch'){
      const row = document.createElement('div');
      row.className = 'swatch-row';
      row.id = 'f_'+id;
      row.dataset.value = defVal;
      options.forEach(opt=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'swatch-btn' + (opt.value===defVal ? ' active' : '');
        btn.style.background = opt.color;
        btn.title = opt.label;
        btn.dataset.val = opt.value;
        btn.onclick = function(){
          row.dataset.value = opt.value;
          row.querySelectorAll('.swatch-btn').forEach(function(b){ b.classList.remove('active'); });
          btn.classList.add('active');
          renderSlide();
        };
        row.appendChild(btn);
      });
      wrap.appendChild(row);
    } else if(fieldType==='select'){
      const sel = document.createElement('select');
      sel.id = 'f_'+id;
      options.forEach(opt=>{
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        if(opt.value===defVal) o.selected = true;
        sel.appendChild(o);
      });
      sel.onchange = renderSlide;
      wrap.appendChild(sel);
    } else if(fieldType==='textarea'){
      const row = document.createElement('div');
      row.className='input-row';
      const ta = document.createElement('textarea');
      ta.id = 'f_'+id;
      ta.value = defVal;
      ta.oninput = renderSlide;
      row.appendChild(ta);
      if(speechSupported) row.appendChild(makeMicButton('f_'+id));
      wrap.appendChild(row);
    } else {
      const row = document.createElement('div');
      row.className='input-row';
      const inp = document.createElement('input');
      inp.type='text';
      inp.id='f_'+id;
      inp.value = defVal;
      inp.oninput = renderSlide;
      row.appendChild(inp);
      if(speechSupported) row.appendChild(makeMicButton('f_'+id));
      wrap.appendChild(row);
    }

    if(styleFieldIds.includes(id)) controlsWrap.appendChild(wrap);
    else container.appendChild(wrap);
  });
  renderSlide();
}

function makeMicButton(fieldId){
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'mic-btn';
  btn.dataset.field = fieldId;
  btn.innerHTML = micIcon;
  btn.title = 'Tap to dictate';
  btn.onclick = function(e){
    e.preventDefault();
    toggleMic(fieldId, btn);
  };
  return btn;
}

/* ===== VOICE DICTATION ===== */
let recognition = null;
let recognizing = false;
let activeFieldId = null;
let baseTextForRecognition = '';

function initRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  r.onresult = function(e){
    let finalText = '';
    let interimText = '';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t;
      else interimText += t;
    }
    if(finalText) baseTextForRecognition = (baseTextForRecognition + ' ' + finalText).trim();
    const el = document.getElementById(activeFieldId);
    if(el){
      el.value = (baseTextForRecognition + ' ' + interimText).trim();
      renderSlide();
    }
  };
  r.onend = function(){
    if(recognizing){
      try{ r.start(); }catch(err){}
    }
  };
  r.onerror = function(){
    stopRecognition();
  };
  return r;
}

function toggleMic(fieldId, btn){
  if(!speechSupported){
    alert('Voice dictation needs Chrome or Safari — try one of those on this device.');
    return;
  }
  if(recognizing && activeFieldId===fieldId){
    stopRecognition();
    return;
  }
  if(recognizing) stopRecognition();
  activeFieldId = fieldId;
  const el = document.getElementById(fieldId);
  baseTextForRecognition = el ? el.value : '';
  if(!recognition) recognition = initRecognition();
  recognizing = true;
  document.querySelectorAll('.mic-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  try{ recognition.start(); }catch(err){}
}

function stopRecognition(){
  recognizing = false;
  if(recognition){ try{ recognition.stop(); }catch(err){} }
  document.querySelectorAll('.mic-btn').forEach(function(b){ b.classList.remove('active'); });
  activeFieldId = null;
}

function val(id){
  const el = document.getElementById('f_'+id);
  if(!el) return '';
  if(el.dataset && el.dataset.value !== undefined) return el.dataset.value;
  return el.value;
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSlide(){
  const type = document.getElementById('layoutSelect').value;
  const el = document.getElementById('slidePreview');
  const bg = val('bg');
  const logo = val('logo');
  const placement = val('placement');
  const texture = val('texture');
  const textColor = val('textColor');
  let html = '';

  switch(type){
    case 'freetext':
      html = buildSlideShell(bg, logo, placement, texture,
        `<div class="free-text">${esc(val('text'))}</div>`,
        placement === 'centered' ? 'center' : 'left', textColor);
      break;
    case 'body':
      html = buildSlideShell(bg, logo, placement, texture, `
        <div class="headline">${esc(val('headline'))}</div>
        <div class="body-p">${esc(val('body1'))}</div>
        <div class="body-p">${esc(val('body2'))}</div>
      `, 'left', textColor);
      break;
    case 'list':
      html = buildSlideShell(bg, logo, placement, texture, `
        <div class="headline">${esc(val('headline'))}</div>
        ${buildBulletList([val('i1'),val('i2'),val('i3'),val('i4'),val('i5'),val('i6')], val('bulletStyle'))}
      `, 'left', textColor);
      break;
    case 'quote':
      html = buildSlideShell(bg, logo, placement, texture, `
        <div class="quote-text">${esc(val('quote'))}</div>
        <div class="attribution">${esc(val('attribution'))}</div>
      `, 'center', textColor);
      break;
    case 'stat':
      html = buildSlideShell(bg, logo, placement, texture, `
        <div class="eyebrow">${esc(val('eyebrow'))}</div>
        <div class="metric">${esc(val('metric'))}</div>
        <div class="metric-label">${esc(val('metriclabel'))}</div>
        <div class="context">${esc(val('context'))}</div>
      `, 'left', textColor);
      break;
    case 'split':
      html = buildSlideShell(bg, logo, placement, texture, `
        <div class="headline">${esc(val('headline'))}</div>
        <div class="split-cols">
          <div class="split-col"><div class="split-col-h">${esc(val('col1h'))}</div><p>${esc(val('col1body'))}</p></div>
          <div class="split-col"><div class="split-col-h">${esc(val('col2h'))}</div><p>${esc(val('col2body'))}</p></div>
        </div>
      `, 'left', textColor);
      break;
  }

  el.style.cssText = '';
  el.innerHTML = html;
}

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function downloadSlide(){
  const node = document.getElementById('slidePreview');
  const btn = document.querySelector('.download-btn');
  const original = btn.textContent;
  html2canvas(node, {scale: 1080/node.offsetWidth, useCORS:true}).then(canvas=>{
    const dataUrl = canvas.toDataURL('image/png');
    if(isIOS()){
      // iOS Safari ignores the download attribute — open the image so the user can long-press to save it
      const win = window.open();
      if(win){
        win.document.write('<title>Long-press image to save</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="'+dataUrl+'" style="max-width:100%;height:auto;"></body>');
      } else {
        window.location.href = dataUrl;
      }
      btn.textContent = 'Long-Press Image to Save';
    } else {
      const type = document.getElementById('layoutSelect').value;
      const link = document.createElement('a');
      link.download = type + '_slide.png';
      link.href = dataUrl;
      link.click();
      btn.textContent = 'Downloaded';
    }
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent = original; btn.classList.remove('done'); }, 2000);
  });
}

function buildAppIcon(size, bg){
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,size,size);

  const pad = size * 0.24;
  const inner = size - pad*2;
  const scale = inner / 100;
  const tx = x => pad + x*scale;
  const ty = y => pad + y*scale;

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4*scale;
  ctx.lineCap = 'round';
  [[50,50,50,12],[50,50,82,68],[50,50,18,68]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();
    ctx.moveTo(tx(x1),ty(y1));
    ctx.lineTo(tx(x2),ty(y2));
    ctx.stroke();
  });

  const circle = (x,y,r,color) => {
    ctx.beginPath();
    ctx.arc(tx(x),ty(y), r*scale, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  };
  circle(50,12,8.4,'#00B8B8');
  circle(82,68,8.4,'#00B8B8');
  circle(18,68,8.4,'#00B8B8');
  circle(50,50,6,'#fff');

  return canvas.toDataURL('image/png');
}

const appIcon = buildAppIcon(180, '#0A0A0A');
document.getElementById('faviconLink').href = appIcon;
document.getElementById('appleTouchIcon').href = appIcon;

document.getElementById('headlineScale').addEventListener('input', function(){
  const v = parseFloat(this.value);
  document.getElementById('slidePreview').style.setProperty('--headline-scale', v);
  document.getElementById('headlineScaleLabel').textContent = Math.round(v*100) + '%';
});
document.getElementById('bodyScale').addEventListener('input', function(){
  const v = parseFloat(this.value);
  document.getElementById('slidePreview').style.setProperty('--body-scale', v);
  document.getElementById('bodyScaleLabel').textContent = Math.round(v*100) + '%';
});

buildForm();
document.getElementById('layoutSelect').addEventListener('change', buildForm);
</script>
