<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Slide Gen">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" id="faviconLink" type="image/png">
<link rel="apple-touch-icon" id="appleTouchIcon">
<title>Chase Chavez — Post Slide Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap');

  :root{
    --athletic-blue:#005F87;
    --performance-teal:#00B8B8;
    --warm-slate:#565A5C;
    --near-black:#0A0A0A;
    --off-white:#F5F4F2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#e8e6e2;
    font-family:'Barlow', Arial, sans-serif;
    color:var(--near-black);
  }

  .app{
    display:grid;
    grid-template-columns:380px 1fr;
    min-height:100vh;
  }
  @media (max-width:900px){
    .app{display:flex;flex-direction:column;}
    .preview-area{order:-1;padding:20px 16px;position:sticky;top:0;background:#e8e6e2;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.08);}
    .slide-shell{width:320px;}
    .panel{max-height:none;padding:20px 16px 100px;border-right:none;}
    .download-btn{
      position:fixed;left:16px;right:16px;bottom:16px;width:auto;
      z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.3);
      padding:14px 0 calc(14px + env(safe-area-inset-bottom));
    }
  }

  /* ===== LEFT PANEL ===== */
  .panel{
    background:#fff;
    border-right:1px solid #ddd8d3;
    padding:24px;
    overflow-y:auto;
    max-height:100vh;
  }
  .panel-header{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
  .panel-header .node-mark-header{width:34px;height:34px;flex-shrink:0;}
  .panel h1{
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-weight:700;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin:0;
  }
  .panel .sub{font-size:12px;color:var(--warm-slate);margin-bottom:20px;}

  label{
    display:block;
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--warm-slate);
    margin:16px 0 6px;
  }
  select, input[type=text], textarea, input[type=file]{
    width:100%;
    padding:9px 10px;
    border:1px solid #ccc;
    border-radius:4px;
    font-family:'Barlow', Arial, sans-serif;
    font-size:16px;
    color:var(--near-black);
    background:#fff;
  }
  textarea{resize:vertical;min-height:56px;}
  select{cursor:pointer;}

  .field-group{
    border-top:1px dashed #ddd;
    padding-top:4px;
    margin-top:12px;
  }

  .input-row{display:flex;gap:6px;align-items:flex-start;}
  .input-row input, .input-row textarea{flex:1;min-width:0;}
  .mic-btn{
    flex-shrink:0;
    width:38px;height:38px;
    border:1px solid #ccc;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .mic-btn svg{width:17px;height:17px;}
  .mic-btn svg *{fill:var(--warm-slate);}
  .mic-btn.active{background:#c0392b;border-color:#c0392b;animation:pulse 1.2s infinite;}
  .mic-btn.active svg *{fill:#fff;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,0.5);}70%{box-shadow:0 0 0 8px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
  .mic-hint{font-size:11px;color:var(--performance-teal);margin-top:4px;display:none;}
  .mic-hint.show{display:block;}

  .download-btn{
    display:block;
    width:100%;
    margin-top:24px;
    background:var(--athletic-blue);
    color:#fff;
    border:none;
    padding:13px 0;
    border-radius:4px;
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
  }
  .download-btn:hover{background:#004a6b;}
  .download-btn.done{background:var(--performance-teal);}

  .reset-note{
    font-size:11px;
    color:var(--warm-slate);
    margin-top:10px;
    line-height:1.4;
  }

  /* ===== RIGHT PANEL / PREVIEW ===== */
  .preview-area{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }
  .slide-shell{
    width:520px;
    max-width:90vw;
    box-shadow:0 4px 24px rgba(0,0,0,0.15);
  }
  .slide{
    width:100%;
    aspect-ratio:1/1;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    background-size:cover;
    background-position:center;
  }

  .node-mark-sm{width:22px;height:22px;flex-shrink:0;}
  .brand-wordmark{
    font-family:'Barlow Condensed', Arial, sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:3px;
    text-transform:uppercase;
  }

  /* --- shared type styles --- */
  .s-cover{background:linear-gradient(160deg, var(--near-black) 0%, #1f2426 100%);padding:48px 44px;justify-content:space-between;}
  .s-cover .top{display:flex;align-items:center;gap:10px;}
  .s-cover .brand-wordmark{color:#fff;opacity:0.9;}
  .s-cover .headline{font-family:'Barlow Condensed';font-weight:700;font-size:52px;line-height:1.03;text-transform:uppercase;color:#fff;white-space:pre-wrap;}
  .s-cover .headline .accent{color:var(--performance-teal);}
  .s-cover .tagline{font-family:'Barlow Condensed';font-style:italic;font-size:16px;letter-spacing:0.5px;color:var(--performance-teal);}
  .tagline-text{text-transform:none !important;font-style:italic;}

  .s-insight{background:var(--off-white);padding:56px 48px;justify-content:center;}
  .s-insight .rule{display:flex;gap:6px;margin-bottom:24px;}
  .s-insight .rule span{width:5px;height:34px;background:var(--near-black);}
  .s-insight .headline{font-family:'Barlow Condensed';font-weight:700;font-size:34px;line-height:1.08;text-transform:uppercase;color:var(--near-black);margin-bottom:20px;white-space:pre-wrap;}
  .s-insight .body{font-size:18px;line-height:1.45;color:var(--warm-slate);font-weight:500;white-space:pre-wrap;}

  .s-breakdown{background:var(--athletic-blue);color:#fff;}
  .s-breakdown .header-row{display:flex;justify-content:space-between;align-items:center;padding:20px 32px 16px;}
  .s-breakdown .brand-wordmark{color:rgba(255,255,255,0.85);font-size:11px;letter-spacing:3px;}
  .s-breakdown .title-bar{background:var(--off-white);padding:18px 32px;}
  .s-breakdown .title-bar h2{font-family:'Barlow Condensed';font-weight:700;font-size:25px;line-height:1.1;text-transform:uppercase;color:var(--near-black);margin:0;white-space:pre-wrap;}
  .s-breakdown ul{padding:24px 32px 0;margin:0;list-style:none;flex:1;}
  .s-breakdown li{font-size:16px;line-height:1.4;margin-bottom:16px;position:relative;padding-left:20px;}
  .s-breakdown li:before{content:"";position:absolute;left:0;top:8px;width:8px;height:8px;background:var(--performance-teal);border-radius:50%;}

  .s-bold{background:var(--warm-slate);padding:52px 44px;justify-content:space-between;}
  .s-bold .headline{font-family:'Barlow Condensed';font-weight:800;font-size:40px;line-height:1.06;text-transform:uppercase;color:var(--performance-teal);white-space:pre-wrap;}
  .s-bold .sub{font-size:17px;line-height:1.5;color:#fff;margin-top:22px;white-space:pre-wrap;}
  .s-bold .brand-wordmark{color:rgba(255,255,255,0.6);margin-top:24px;}

  .s-whyitmatters{background:var(--near-black);padding:44px 40px;}
  .s-whyitmatters .top-rule{width:60px;height:3px;background:var(--performance-teal);margin-bottom:18px;}
  .s-whyitmatters h2{font-family:'Barlow Condensed';font-weight:800;font-size:30px;line-height:1.08;text-transform:uppercase;color:#fff;margin:0 0 22px;white-space:pre-wrap;}
  .s-whyitmatters ul{list-style:none;padding:0;margin:0;flex:1;}
  .s-whyitmatters li{font-size:15px;line-height:1.4;color:#d8d6d3;margin-bottom:16px;padding-left:18px;position:relative;}
  .s-whyitmatters li:before{content:"—";position:absolute;left:0;color:var(--performance-teal);}
  .s-whyitmatters .brand-wordmark{color:rgba(255,255,255,0.5);margin-top:auto;align-self:center;padding-top:16px;}

  .s-quote{background:var(--near-black);padding:48px 44px;justify-content:center;align-items:center;text-align:center;}
  .s-quote .label{font-family:'Barlow Condensed';font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--performance-teal);margin-bottom:28px;align-self:flex-start;}
  .s-quote .quote-text{font-size:23px;line-height:1.4;color:#fff;white-space:pre-wrap;}
  .s-quote .attribution{margin-top:24px;font-family:'Barlow Condensed';font-size:18px;color:var(--performance-teal);}

  .s-beforeafter{background:var(--off-white);padding:0;}
  .s-beforeafter .header{padding:22px 32px 16px;}
  .s-beforeafter .header h2{font-family:'Barlow Condensed';font-weight:700;font-size:24px;text-transform:uppercase;color:var(--near-black);margin:0;white-space:pre-wrap;}
  .s-beforeafter .cols{flex:1;display:flex;}
  .s-beforeafter .col{flex:1;padding:20px 22px;}
  .s-beforeafter .col.before{background:var(--warm-slate);color:#fff;}
  .s-beforeafter .col.after{background:var(--athletic-blue);color:#fff;}
  .s-beforeafter .col-label{font-family:'Barlow Condensed';font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:0.8;margin-bottom:14px;}
  .s-beforeafter .col p{font-size:14px;line-height:1.45;margin:0 0 10px;white-space:pre-wrap;}

  .s-mistake{background:var(--near-black);padding:36px 36px 30px;}
  .s-mistake h2{font-family:'Barlow Condensed';font-weight:800;font-size:26px;text-transform:uppercase;color:#fff;margin:0 0 24px;white-space:pre-wrap;}
  .s-mistake .row{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
  .s-mistake .tag{font-family:'Barlow Condensed';font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:2px;flex-shrink:0;margin-top:2px;}
  .s-mistake .tag.wrong{background:#5c2a2a;color:#f2b8b8;}
  .s-mistake .tag.right{background:#0d3d3d;color:#7fe0d8;}
  .s-mistake .row p{font-size:15px;line-height:1.4;color:#e5e3e0;margin:0;white-space:pre-wrap;}
  .s-mistake .brand-wordmark{color:rgba(255,255,255,0.5);margin-top:auto;align-self:center;padding-top:10px;}

  .s-rts{background:var(--performance-teal);padding:40px 36px;}
  .s-rts h2{font-family:'Barlow Condensed';font-weight:800;font-size:26px;text-transform:uppercase;color:var(--near-black);margin:0 0 22px;white-space:pre-wrap;}
  .s-rts ul{list-style:none;padding:0;margin:0;flex:1;}
  .s-rts li{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;font-size:15px;line-height:1.4;color:var(--near-black);font-weight:500;white-space:pre-wrap;}
  .s-rts .box{width:20px;height:20px;border:2.5px solid var(--near-black);border-radius:3px;flex-shrink:0;margin-top:2px;}
  .s-rts .brand-wordmark{color:rgba(20,20,20,0.55);align-self:center;}

  .s-result{background:var(--near-black);padding:44px 40px;justify-content:space-between;}
  .s-result .eyebrow{font-family:'Barlow Condensed';font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--performance-teal);}
  .s-result .metric{font-family:'Barlow Condensed';font-weight:800;font-size:82px;color:#fff;line-height:1;margin:14px 0 6px;}
  .s-result .metric-label{font-size:16px;color:#d8d6d3;font-weight:500;margin-bottom:26px;white-space:pre-wrap;}
  .s-result .context{font-size:14px;line-height:1.5;color:#b8b6b3;border-top:1px solid #333;padding-top:18px;white-space:pre-wrap;}

  .s-define{background:var(--athletic-blue);padding:44px 40px;justify-content:center;}
  .s-define .term{font-family:'Barlow Condensed';font-weight:800;font-size:36px;text-transform:uppercase;color:#fff;margin-bottom:6px;}
  .s-define .pos{font-size:14px;font-style:italic;color:var(--performance-teal);margin-bottom:20px;}
  .s-define .def{font-size:17px;line-height:1.5;color:#eaf3f7;white-space:pre-wrap;}
  .s-define .why{margin-top:20px;font-size:13px;line-height:1.5;color:rgba(255,255,255,0.75);border-left:3px solid var(--performance-teal);padding-left:14px;white-space:pre-wrap;}

  .s-progress{background:var(--off-white);padding:36px 34px;}
  .s-progress h2{font-family:'Barlow Condensed';font-weight:700;font-size:23px;text-transform:uppercase;color:var(--near-black);margin:0 0 20px;white-space:pre-wrap;}
  .s-progress .phase{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #ddd8d3;}
  .s-progress .phase:last-child{border-bottom:none;}
  .s-progress .phase-num{font-family:'Barlow Condensed';font-weight:800;font-size:24px;color:var(--performance-teal);width:36px;flex-shrink:0;}
  .s-progress .phase-title{font-family:'Barlow Condensed';font-weight:600;font-size:15px;text-transform:uppercase;color:var(--near-black);}
  .s-progress .phase-detail{font-size:12px;color:var(--warm-slate);margin-top:2px;white-space:pre-wrap;}

  /* --- new photo-based types --- */
  .s-photocover{padding:40px 36px;justify-content:space-between;background-color:#333;}
  .s-photocover:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.65) 100%);}
  .s-photocover > *{position:relative;z-index:1;}
  .s-photocover .top-block{text-align:center;margin-top:30px;}
  .s-photocover .series-title{font-family:'Barlow Condensed';font-weight:800;font-size:46px;letter-spacing:1px;text-transform:uppercase;color:#fff;}
  .s-photocover .subtitle{font-family:'Barlow Condensed';font-weight:500;font-style:italic;font-size:17px;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-top:10px;}
  .s-photocover .bottom-block{display:flex;align-items:center;justify-content:center;gap:10px;}
  .s-photocover .brand-wordmark{color:#fff;}

  .s-photobanner{background-color:#333;}
  .s-photobanner:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.05) 55%, rgba(0,0,0,0.55) 100%);}
  .s-photobanner > *{position:relative;z-index:1;}
  .s-photobanner .top-row{display:flex;align-items:center;gap:8px;padding:26px 28px 0;}
  .s-photobanner .series-label{font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#fff;}
  .s-photobanner .spacer{flex:1;}
  .s-photobanner .banner{margin-top:auto;background:rgba(0,95,135,0.88);padding:26px 28px;}
  .s-photobanner .banner h2{font-family:'Barlow Condensed';font-weight:800;font-size:30px;line-height:1.1;text-transform:uppercase;color:#fff;margin:0;white-space:pre-wrap;}

  .s-quotehighlight{padding:52px 40px;justify-content:center;background-color:#222;}
  .s-quotehighlight:before{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.4);}
  .s-quotehighlight > *{position:relative;z-index:1;}
  .s-quotehighlight .top-row{display:flex;align-items:center;gap:8px;margin-bottom:26px;}
  .s-quotehighlight .brand-wordmark{color:#fff;}
  .s-quotehighlight .quote-highlight{
    font-family:'Barlow Condensed';
    font-weight:700;
    font-size:26px;
    line-height:1.55;
    text-transform:uppercase;
    color:#fff;
    background:var(--performance-teal);
    box-decoration-break:clone;
    -webkit-box-decoration-break:clone;
    padding:4px 8px;
    white-space:pre-wrap;
  }
  .s-quotehighlight .attribution{margin-top:22px;font-family:'Barlow Condensed';font-size:16px;letter-spacing:1px;text-transform:uppercase;color:#fff;}

</style>
</head>
<body>

<div class="app">

  <!-- ================= LEFT PANEL ================= -->
  <div class="panel">
    <div class="panel-header">
      <svg class="node-mark-header" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="50" x2="50" y2="12" stroke="#005F87" stroke-width="4"/>
        <line x1="50" y1="50" x2="82" y2="68" stroke="#005F87" stroke-width="4"/>
        <line x1="50" y1="50" x2="18" y2="68" stroke="#005F87" stroke-width="4"/>
        <circle cx="50" cy="12" r="8.4" fill="#00B8B8"/>
        <circle cx="82" cy="68" r="8.4" fill="#00B8B8"/>
        <circle cx="18" cy="68" r="8.4" fill="#00B8B8"/>
        <circle cx="50" cy="50" r="6" fill="#005F87"/>
      </svg>
      <h1>Post Slide Generator</h1>
    </div>
    <div class="sub">Pick a layout, drop in your topic, download.</div>

    <label>Layout</label>
    <select id="layoutSelect">
      <optgroup label="Photo-based">
        <option value="photocover">Series Cover (photo + title)</option>
        <option value="photobanner">Photo + Bottom Banner</option>
        <option value="quotehighlight">Quote Highlight (photo)</option>
      </optgroup>
      <optgroup label="Core">
        <option value="cover">Cover (dark, no photo)</option>
        <option value="insight">Insight / Finding</option>
        <option value="breakdown">Breakdown (bullets)</option>
        <option value="bold">Bold Statement</option>
        <option value="whyitmatters">Why It Matters</option>
        <option value="quote">Quote (no photo)</option>
      </optgroup>
      <optgroup label="Rehab & Performance">
        <option value="beforeafter">Before / After Protocol</option>
        <option value="mistake">Mistake vs. Better Approach</option>
        <option value="rts">Return-to-Sport Checklist</option>
        <option value="result">Case Result / Metric</option>
        <option value="define">Term / Concept Breakdown</option>
        <option value="progress">Progression / Phase Framework</option>
      </optgroup>
    </select>

    <div id="formFields"></div>

    <button class="download-btn" onclick="downloadSlide()">Download PNG</button>
    <div class="reset-note">Tap the mic next to any field to dictate instead of typing. Your entries stay on screen as you switch layouts to compare — refresh the page to start fully clean. Photos aren't saved anywhere; they only live in your browser tab.</div>
  </div>

  <!-- ================= RIGHT PANEL / PREVIEW ================= -->
  <div class="preview-area">
    <div class="slide-shell">
      <div class="slide" id="slidePreview"></div>
    </div>
  </div>

</div>

<script>
const nodeMarkWhite = `<svg class="node-mark-sm" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <line x1="50" y1="50" x2="50" y2="12" stroke="#fff" stroke-width="4"/>
  <line x1="50" y1="50" x2="82" y2="68" stroke="#fff" stroke-width="4"/>
  <line x1="50" y1="50" x2="18" y2="68" stroke="#fff" stroke-width="4"/>
  <circle cx="50" cy="12" r="8.4" fill="#00B8B8"/>
  <circle cx="82" cy="68" r="8.4" fill="#00B8B8"/>
  <circle cx="18" cy="68" r="8.4" fill="#00B8B8"/>
  <circle cx="50" cy="50" r="6" fill="#fff"/>
</svg>`;

// field schema per layout: [id, label, type ('text'|'textarea'|'image'), default value]
const schemas = {
  cover: [
    ['title','Headline (use \\n for line breaks)','textarea',''],
    ['accent','Accent line (teal, optional)','text',''],
    ['tagline','Bottom tagline','text','Build what stays.'],
    ['wordmark','Wordmark','text','Chase Chavez']
  ],
  insight: [
    ['headline','Headline','textarea',''],
    ['body','Body text','textarea','']
  ],
  breakdown: [
    ['handle','Small handle/label','text','@chasechavezdpt'],
    ['title','Title bar headline','textarea',''],
    ['b1','Bullet 1','text',''],
    ['b2','Bullet 2','text',''],
    ['b3','Bullet 3','text',''],
    ['b4','Bullet 4','text','']
  ],
  bold: [
    ['headline','Bold claim','textarea',''],
    ['sub','Supporting context','textarea',''],
    ['wordmark','Wordmark','text','CHASE CHAVEZ · PT · DPT · SCS']
  ],
  whyitmatters: [
    ['title','Headline','textarea',''],
    ['b1','Bullet 1','text',''],
    ['b2','Bullet 2','text',''],
    ['b3','Bullet 3','text',''],
    ['b4','Bullet 4','text',''],
    ['wordmark','Bottom line','text','Build what stays.']
  ],
  quote: [
    ['quote','Quote text','textarea',''],
    ['attribution','Attribution','text','— Chase Chavez, PT · DPT · SCS']
  ],
  beforeafter: [
    ['title','Protocol name','text',''],
    ['beforeP1','Before — point 1','textarea',''],
    ['beforeP2','Before — point 2','textarea',''],
    ['afterP1','After — point 1','textarea',''],
    ['afterP2','After — point 2','textarea','']
  ],
  mistake: [
    ['title','Headline','textarea',''],
    ['common','Common approach','textarea',''],
    ['better','Better approach','textarea',''],
    ['why','Why it matters','textarea','']

function buildForm(){
  stopRecognition();
  const type = document.getElementById('layoutSelect').value;
  const container = document.getElementById('formFields');
  container.innerHTML = '';
  schemas[type].forEach(([id,label,fieldType,defVal])=>{
    const wrap = document.createElement('div');
    wrap.className='field-group';
    const lab = document.createElement('label');
    lab.textContent = label;
    wrap.appendChild(lab);

    if(fieldType==='textarea'){
      const row = document.createElement('div');
      row.className='input-row';
      const ta = document.createElement('textarea');
      ta.id = 'f_'+id;
      ta.value = defVal.replace(/\\n/g,'\n');
      ta.oninput = renderSlide;
      row.appendChild(ta);
      if(speechSupported) row.appendChild(makeMicButton('f_'+id));
      wrap.appendChild(row);
    } else if(fieldType==='image'){
      const inp = document.createElement('input');
      inp.type='file';
      inp.accept='image/*';
      inp.id='f_'+id;
      inp.onchange = function(e){
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev){
          currentPhoto[type] = ev.target.result;
          renderSlide();
        };
        reader.readAsDataURL(file);
      };
      wrap.appendChild(inp);
    } else {
      const row = document.createElement('div');
      row.className='input-row';
      const inp = document.createElement('input');
      inp.type='text';
      inp.id='f_'+id;
      inp.value = defVal;
      inp.oninput = renderSlide;
      row.appendChild(inp);
      if(speechSupported) row.appendChild(makeMicButton('f_'+id));
      wrap.appendChild(row);
    }
    container.appendChild(wrap);
  });
  renderSlide();
}

function makeMicButton(fieldId){
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'mic-btn';
  btn.dataset.field = fieldId;
  btn.innerHTML = micIcon;
  btn.title = 'Tap to dictate';
  btn.onclick = function(e){
    e.preventDefault();
    toggleMic(fieldId, btn);
  };
  return btn;
}

/* ===== VOICE DICTATION ===== */
let recognition = null;
let recognizing = false;
let activeFieldId = null;
let baseTextForRecognition = '';

function initRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  r.onresult = function(e){
    let finalText = '';
    let interimText = '';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t;
      else interimText += t;
    }
    if(finalText) baseTextForRecognition = (baseTextForRecognition + ' ' + finalText).trim();
    const el = document.getElementById(activeFieldId);
    if(el){
      el.value = (baseTextForRecognition + ' ' + interimText).trim();
      renderSlide();
    }
  };
  r.onend = function(){
    if(recognizing){
      try{ r.start(); }catch(err){}
    }
  };
  r.onerror = function(){
    stopRecognition();
  };
  return r;
}

function toggleMic(fieldId, btn){
  if(!speechSupported){
    alert('Voice dictation needs Chrome or Safari — try one of those on this device.');
    return;
  }
  if(recognizing && activeFieldId===fieldId){
    stopRecognition();
    return;
  }
  if(recognizing) stopRecognition();
  activeFieldId = fieldId;
  const el = document.getElementById(fieldId);
  baseTextForRecognition = el ? el.value : '';
  if(!recognition) recognition = initRecognition();
  recognizing = true;
  document.querySelectorAll('.mic-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  try{ recognition.start(); }catch(err){}
}

function stopRecognition(){
  recognizing = false;
  if(recognition){ try{ recognition.stop(); }catch(err){} }
  document.querySelectorAll('.mic-btn').forEach(function(b){ b.classList.remove('active'); });
  activeFieldId = null;
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function downloadSlide(){
  const node = document.getElementById('slidePreview');
  const btn = document.querySelector('.download-btn');
  const original = btn.textContent;
  html2canvas(node, {scale: 1080/node.offsetWidth, useCORS:true}).then(canvas=>{
    const dataUrl = canvas.toDataURL('image/png');
    if(isIOS()){
      // iOS Safari ignores the download attribute — open the image so the user can long-press to save it
      const win = window.open();
      if(win){
        win.document.write('<title>Long-press image to save</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="'+dataUrl+'" style="max-width:100%;height:auto;"></body>');
      } else {
        window.location.href = dataUrl;
      }
      btn.textContent = 'Long-Press Image to Save';
    } else {
      const type = document.getElementById('layoutSelect').value;
      const link = document.createElement('a');
      link.download = type + '_slide.png';
      link.href = dataUrl;
      link.click();
      btn.textContent = 'Downloaded';
    }
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent = original; btn.classList.remove('done'); }, 2000);
  });
}

function buildAppIcon(size, bg){
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,size,size);

  const pad = size * 0.24;
  const inner = size - pad*2;
  const scale = inner / 100;
  const tx = x => pad + x*scale;
  const ty = y => pad + y*scale;

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4*scale;
  ctx.lineCap = 'round';
  [[50,50,50,12],[50,50,82,68],[50,50,18,68]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();
    ctx.moveTo(tx(x1),ty(y1));
    ctx.lineTo(tx(x2),ty(y2));
    ctx.stroke();
  });

  const circle = (x,y,r,color) => {
    ctx.beginPath();
    ctx.arc(tx(x),ty(y), r*scale, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  };
  circle(50,12,8.4,'#00B8B8');
  circle(82,68,8.4,'#00B8B8');
  circle(18,68,8.4,'#00B8B8');
  circle(50,50,6,'#fff');

  return canvas.toDataURL('image/png');
}
